<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Los Santos Cardedex V2</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-1: #050505;
      --bg-2: #0d0d0d;
      --blue: #2563eb;
      --red: #dc2626;
      --gold: #f59e0b;
      --soft: rgba(255,255,255,0.08);
      --soft-2: rgba(255,255,255,0.05);
      --text-soft: #bcbcbc;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 28%),
        radial-gradient(circle at bottom, rgba(59,130,246,0.08), transparent 25%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: white;
      min-height: 100vh;
    }

    header {
      padding: 30px 20px 10px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 42px;
      letter-spacing: 1px;
      text-shadow: 0 0 25px rgba(255,255,255,0.08);
    }

    .subtitle {
      color: #9a9a9a;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 20px 20px;
    }

    input, select {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #2e2e2e;
      background: #171717;
      color: white;
      min-width: 220px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus, select:focus {
      border-color: #555;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 24px;
      padding: 20px;
      max-width: 1450px;
      margin: auto;
    }

    .card {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      box-shadow: 0 0 0 1px #222, 0 14px 30px rgba(0,0,0,0.28);
      isolation: isolate;
      background: linear-gradient(180deg, #141414, #0b0b0b);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 0 0 1px #333, 0 22px 35px rgba(0,0,0,0.42);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 15%, rgba(255,255,255,0.11) 35%, transparent 55%);
      transform: translateX(-120%);
      transition: transform 0.8s ease;
      pointer-events: none;
      z-index: 3;
    }

    .card:hover::before {
      transform: translateX(120%);
    }

    .card.holo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg,
          rgba(255,0,128,0.10) 0%,
          rgba(0,204,255,0.10) 22%,
          rgba(255,255,0,0.12) 45%,
          rgba(0,255,128,0.10) 65%,
          rgba(255,0,255,0.08) 100%);
      mix-blend-mode: screen;
      opacity: 0.7;
      pointer-events: none;
      z-index: 2;
      animation: holoShift 6s linear infinite;
    }

    @keyframes holoShift {
      0% { transform: translateX(-8%) translateY(0%) rotate(0deg); }
      50% { transform: translateX(8%) translateY(-2%) rotate(1deg); }
      100% { transform: translateX(-8%) translateY(0%) rotate(0deg); }
    }

    .card.rare {
      border: 2px solid var(--blue);
      background:
        radial-gradient(circle at top right, rgba(37,99,235,0.18), transparent 35%),
        linear-gradient(180deg, #141821, #0b0b0b);
    }

    .card.epique {
      border: 2px solid var(--red);
      background:
        radial-gradient(circle at top right, rgba(220,38,38,0.18), transparent 35%),
        linear-gradient(180deg, #1c1212, #0b0b0b);
    }

    .card.legendaire {
      border: 2px solid var(--gold);
      background:
        radial-gradient(circle at top right, rgba(245,158,11,0.18), transparent 35%),
        linear-gradient(180deg, #22180b, #0b0b0b);
    }

    .card-frame-bg {
      position: absolute;
      inset: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.07);
      pointer-events: none;
      z-index: 1;
    }

    .card img {
      position: relative;
      z-index: 0;
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .card-content {
      position: relative;
      z-index: 4;
      padding: 14px;
    }

    .card-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-number {
      font-size: 11px;
      color: #9d9d9d;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .rarity-icon {
      font-size: 16px;
      line-height: 1;
    }

    .tag {
      display: inline-block;
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .rare .tag { background: var(--blue); }
    .epique .tag { background: var(--red); }
    .legendaire .tag {
      background: var(--gold);
      color: black;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.15;
    }

    .series-line {
      font-size: 12px;
      color: #a7a7a7;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stats {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: #ddd;
    }

    .special {
      margin-top: 10px;
      font-size: 14px;
      color: #fff;
      font-weight: bold;
    }

    .price {
      margin-top: 8px;
      color: #bbb;
      font-size: 14px;
    }

    .click-hint {
      margin-top: 10px;
      font-size: 12px;
      color: #8f8f8f;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .empty-state {
      text-align: center;
      color: #aaa;
      padding: 40px 20px;
      font-size: 18px;
      grid-column: 1 / -1;
    }

    /* MODAL FIX */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.84);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 3000;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes popIn {
      from {
        transform: scale(0.96);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-box {
      width: min(100%, 800px);
      max-height: calc(100vh - 32px);
      background: transparent;
      border: none;
      box-shadow: none;
      display: block;
      animation: popIn 0.2s ease;
    }

    .card-frame {
      position: relative;
      width: 100%;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      border-radius: 30px;
      padding: 18px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #1a1a1a, #090909);
      border: 4px solid rgba(255,255,255,0.12);
      box-shadow:
        0 25px 70px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.08);
      scrollbar-width: thin;
    }

    .card-frame::-webkit-scrollbar {
      width: 8px;
    }

    .card-frame::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    .card-frame::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }

    .card-frame.rare {
      border-color: #2563eb;
      background:
        radial-gradient(circle at top right, rgba(37,99,235,0.18), transparent 32%),
        linear-gradient(180deg, #171d29, #090909);
      box-shadow:
        0 25px 70px rgba(0,0,0,0.55),
        0 0 25px rgba(37,99,235,0.18),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .card-frame.epique {
      border-color: #dc2626;
      background:
        radial-gradient(circle at top right, rgba(220,38,38,0.18), transparent 32%),
        linear-gradient(180deg, #221313, #090909);
      box-shadow:
        0 25px 70px rgba(0,0,0,0.55),
        0 0 25px rgba(220,38,38,0.18),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .card-frame.legendaire {
      border-color: #f59e0b;
      background:
        radial-gradient(circle at top right, rgba(245,158,11,0.18), transparent 32%),
        linear-gradient(180deg, #261b0d, #090909);
      box-shadow:
        0 25px 70px rgba(0,0,0,0.55),
        0 0 30px rgba(245,158,11,0.22),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .card-frame.holo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg,
          rgba(255,0,140,0.08) 0%,
          rgba(0,191,255,0.08) 22%,
          rgba(255,255,255,0.08) 45%,
          rgba(255,217,0,0.08) 70%,
          rgba(0,255,170,0.08) 100%);
      mix-blend-mode: screen;
      pointer-events: none;
      animation: holoShift 6s linear infinite;
    }

    .close-btn {
      position: sticky;
      top: 0;
      margin-left: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #242424;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: 0.2s ease;
      z-index: 20;
      min-width: auto;
      padding: 0;
    }

    .close-btn:hover {
      background: #353535;
      transform: scale(1.05);
    }

    .frame-top {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
      padding-right: 0;
    }

    .frame-head-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .frame-name {
      font-size: 34px;
      font-weight: 900;
      line-height: 1.05;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .frame-series {
      color: #bdbdbd;
      font-size: 13px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .frame-number {
      color: #8f8f8f;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .frame-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .frame-rarity {
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .frame-rarity.rare {
      background: #2563eb;
      color: white;
    }

    .frame-rarity.epique {
      background: #dc2626;
      color: white;
    }

    .frame-rarity.legendaire {
      background: #f59e0b;
      color: black;
    }

    .frame-rarity-icon {
      font-size: 18px;
      line-height: 1;
    }

    .frame-image-shell {
      position: relative;
      z-index: 2;
      width: 100%;
      height: clamp(220px, 42vh, 410px);
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)),
        #0f0f0f;
      border: 3px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 10px 30px rgba(0,0,0,0.35);
    }

    .frame-image-shell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: contrast(1.02) saturate(1.05);
    }

    .frame-info-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
      margin-top: 14px;
    }

    .frame-power-box,
    .frame-price-box,
    .frame-stats-block {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .frame-section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b9b9b9;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .frame-special-text {
      font-size: 17px;
      line-height: 1.45;
      font-weight: 700;
      color: white;
    }

    .frame-price {
      font-size: 28px;
      font-weight: 900;
      color: white;
    }

    .frame-stats-block {
      position: relative;
      z-index: 2;
      margin-top: 14px;
    }

    .stat-row {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 14px 14px 12px;
      margin-top: 10px;
    }

    .stat-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: bold;
      color: white;
    }

    .stat-label {
      color: #d5d5d5;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 12px;
    }

    .stat-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.35);
    }

    .stat-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.7s ease;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
    }

    .stat-fill.force {
      background: linear-gradient(90deg, #dc2626, #fb7185);
    }

    .stat-fill.danger {
      background: linear-gradient(90deg, #f59e0b, #facc15);
    }

    .stat-fill.charisme {
      background: linear-gradient(90deg, #7c3aed, #c084fc);
    }

    .frame-footer {
      position: relative;
      z-index: 2;
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: #a9a9a9;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 4px 0;
    }

    @media (max-width: 700px) {
      .modal {
        padding: 10px;
      }

      .modal-box {
        max-height: calc(100vh - 20px);
      }

      .card-frame {
        max-height: calc(100vh - 20px);
        padding: 14px;
        border-radius: 22px;
      }

      .frame-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .frame-right {
        align-items: flex-start;
      }

      .frame-name {
        font-size: 24px;
      }

      .frame-image-shell {
        height: clamp(180px, 32vh, 260px);
      }

      .frame-info-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 32px;
      }

      .card img {
        height: 280px;
      }

      .frame-name {
        font-size: 22px;
      }

      .card-frame {
        padding: 14px;
        border-radius: 22px;
      }
    }
  </style>
</head>

      requestAnimationFrame(() => {
        setTimeout(() => {
          barEl.style.width = `${Math.max(0, Math.min(100, value))}%`;
        }, 80);
      });
    }

    function openModal(card) {
      const cardIndex = cards.indexOf(card) + 1;

      modalImage.src = card.image;
      modalImage.alt = card.name;
      modalName.textContent = card.name;
      modalSeries.textContent = card.series || "Black Streets Series";
      modalCardNumber.textContent = `#${String(cardIndex).padStart(3, "0")}`;
      modalRarity.textContent = card.displayRarity;
      modalRarity.className = `frame-rarity ${card.rarity}`;
      modalRarityIcon.textContent = rarityIcons[card.rarity] || "◆";
      modalSpecialText.textContent = card.special;
      modalPrice.textContent = card.price;
      modalFooterLeft.textContent = "Los Santos Cardedex";
      modalFooterRight.textContent = card.series || "Edition Urbaine";

      modalIntelligenceValue.textContent = card.intelligence;
      modalForceValue.textContent = card.force;
      modalDangerValue.textContent = card.danger;
      modalCharismeValue.textContent = card.charisme;

      modalCardFrame.className = `card-frame ${card.rarity} ${card.rarity === "epique" || card.rarity === "legendaire" ? "holo" : ""}`;

      modal.classList.add("active");
      document.body.style.overflow = "hidden";

      setBar(modalIntelligenceBar, card.intelligence);
      setBar(modalForceBar, card.force);
      setBar(modalDangerBar, card.danger);
      setBar(modalCharismeBar, card.charisme);
    }

    function closeModal() {
      modal.classList.remove("active");
      document.body.style.overflow = "";
    }

    function renderCards() {
      const searchValue = search.value.toLowerCase().trim();
      const filterValue = filter.value;

      const filteredCards = cards.filter(card => {
        const matchName = card.name.toLowerCase().includes(searchValue);
        const matchRarity = filterValue === "all" || card.rarity === filterValue;
        return matchName && matchRarity;
      });

      grid.innerHTML = "";

      if (!filteredCards.length) {
        grid.innerHTML = `<div class="empty-state">Aucune carte trouvée.</div>`;
        return;
      }

      filteredCards.forEach(card => {
        const div = document.createElement("div");
        div.className = getCardClasses(card);

        const cardIndex = cards.indexOf(card) + 1;
        const icon = rarityIcons[card.rarity] || "◆";

        div.innerHTML = `
          <div class="card-frame-bg"></div>
          <img src="${card.image}" alt="${card.name}">
          <div class="card-content">
            <div class="card-topline">
              <div class="card-number">#${String(cardIndex).padStart(3, "0")}</div>
              <div class="rarity-icon">${icon}</div>
            </div>
            <div class="tag">${card.displayRarity}</div>
            <h3>${card.name}</h3>
            <div class="series-line">${card.series || "Black Streets Series"}</div>
            <div class="stats">
              INT: ${card.intelligence}<br>
              FOR: ${card.force}<br>
              DNG: ${card.danger}<br>
              CHA: ${card.charisme}
            </div>
            <div class="special">⭐ ${card.special}</div>
            <div class="price">💰 ${card.price}</div>
            <div class="click-hint">Cliquer pour voir</div>
          </div>
        `;

        div.addEventListener("click", () => openModal(card));
        grid.appendChild(div);
      });
    }

    search.addEventListener("input", renderCards);
    filter.addEventListener("change", renderCards);

    closeModalBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.classList.contains("active")) {
        closeModal();
      }
    });

    renderCards();
  </script>
</body>
</html>
