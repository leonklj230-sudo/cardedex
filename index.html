<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Los Santos Cardedex</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-1: #060606;
      --bg-2: #101010;
      --panel: rgba(255,255,255,0.05);
      --panel-2: rgba(255,255,255,0.08);
      --text-soft: #cfcfcf;
      --border: rgba(255,255,255,0.08);
      --blue: #2563eb;
      --red: #dc2626;
      --gold: #f59e0b;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 28%),
        radial-gradient(circle at bottom, rgba(59,130,246,0.08), transparent 25%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: white;
      min-height: 100vh;
    }

    header {
      padding: 30px 20px 10px;
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 42px;
      letter-spacing: 1px;
      text-shadow: 0 0 25px rgba(255,255,255,0.08);
    }

    .topbar {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 20px 10px;
    }

    input, select, button {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #2e2e2e;
      background: #171717;
      color: white;
      min-width: 220px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus, select:focus {
      border-color: #555;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    .booster-btn {
      min-width: auto;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(135deg, #1f2937, #111827);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .booster-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.35);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 22px;
      padding: 20px;
      max-width: 1450px;
      margin: auto;
    }

    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #151515 0%, #0d0d0d 100%);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      box-shadow: 0 0 0 1px #222, 0 14px 30px rgba(0,0,0,0.28);
      isolation: isolate;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 0 0 1px #333, 0 22px 35px rgba(0,0,0,0.42);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 15%, rgba(255,255,255,0.11) 35%, transparent 55%);
      transform: translateX(-120%);
      transition: transform 0.8s ease;
      pointer-events: none;
      z-index: 2;
    }

    .card:hover::before {
      transform: translateX(120%);
    }

    .card.holo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg,
          rgba(255,0,128,0.10) 0%,
          rgba(0,204,255,0.10) 22%,
          rgba(255,255,0,0.12) 45%,
          rgba(0,255,128,0.10) 65%,
          rgba(255,0,255,0.08) 100%);
      mix-blend-mode: screen;
      opacity: 0.7;
      pointer-events: none;
      z-index: 1;
      animation: holoShift 6s linear infinite;
    }

    @keyframes holoShift {
      0% { transform: translateX(-8%) translateY(0%) rotate(0deg); }
      50% { transform: translateX(8%) translateY(-2%) rotate(1deg); }
      100% { transform: translateX(-8%) translateY(0%) rotate(0deg); }
    }

    .card img {
      position: relative;
      z-index: 0;
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .card-content {
      position: relative;
      z-index: 3;
      padding: 14px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.2;
    }

    .tag {
      display: inline-block;
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .rare {
      border: 2px solid var(--blue);
      box-shadow: 0 0 0 1px rgba(37,99,235,0.12), 0 14px 30px rgba(0,0,0,0.28);
    }
    .rare .tag { background: var(--blue); }

    .epique {
      border: 2px solid var(--red);
      box-shadow: 0 0 0 1px rgba(220,38,38,0.14), 0 14px 30px rgba(0,0,0,0.28);
    }
    .epique .tag { background: var(--red); }

    .legendaire {
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 1px rgba(245,158,11,0.18), 0 14px 30px rgba(0,0,0,0.28);
    }
    .legendaire .tag {
      background: var(--gold);
      color: black;
    }

    .stats {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: #ddd;
    }

    .special {
      margin-top: 10px;
      font-size: 14px;
      color: #fff;
      font-weight: bold;
    }

    .price {
      margin-top: 8px;
      color: #bbb;
      font-size: 14px;
    }

    .click-hint {
      margin-top: 10px;
      font-size: 12px;
      color: #8f8f8f;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .empty-state {
      text-align: center;
      color: #aaa;
      padding: 40px 20px;
      font-size: 18px;
      grid-column: 1 / -1;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 3000;
    }

    .modal.active {
      display: flex;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      width: min(100%, 1120px);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #141414, #0b0b0b);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(0,0,0,0.55);
      display: grid;
      grid-template-columns: 390px 1fr;
      border: 1px solid var(--border);
      animation: popIn 0.2s ease;
      position: relative;
    }

    @keyframes popIn {
      from {
        transform: scale(0.96);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-box.holo::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(130deg,
          rgba(255,0,140,0.08) 0%,
          rgba(0,191,255,0.09) 25%,
          rgba(255,255,255,0.10) 45%,
          rgba(255,220,0,0.08) 70%,
          rgba(0,255,170,0.08) 100%);
      mix-blend-mode: screen;
      pointer-events: none;
      animation: holoShift 7s linear infinite;
    }

    .modal-image-wrap {
      position: relative;
      background: #0c0c0c;
      min-height: 580px;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .modal-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-info {
      position: relative;
      padding: 28px;
      z-index: 2;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #242424;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: 0.2s ease;
      min-width: auto;
      padding: 0;
    }

    .close-btn:hover {
      background: #353535;
      transform: scale(1.05);
    }

    .modal-rarity {
      display: inline-block;
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .modal-rarity.rare {
      background: var(--blue);
      border: none;
      color: white;
    }

    .modal-rarity.epique {
      background: var(--red);
      border: none;
      color: white;
    }

    .modal-rarity.legendaire {
      background: var(--gold);
      border: none;
      color: black;
    }

    .modal-title {
      font-size: 36px;
      margin: 0 0 8px;
      line-height: 1.05;
      max-width: calc(100% - 60px);
      text-shadow: 0 2px 18px rgba(255,255,255,0.06);
    }

    .modal-subinfo {
      color: #c8c8c8;
      font-size: 15px;
      margin-bottom: 18px;
    }

    .modal-special {
      margin: 18px 0 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      font-size: 15px;
      line-height: 1.5;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .modal-price {
      font-size: 19px;
      font-weight: bold;
      margin-bottom: 24px;
      color: #f0f0f0;
    }

    .modal-stats {
      display: grid;
      gap: 14px;
    }

    .stat-row {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 14px 14px 12px;
    }

    .stat-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: bold;
      color: white;
    }

    .stat-label {
      color: #d5d5d5;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 12px;
    }

    .stat-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.35);
    }

    .stat-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.7s ease;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
    }

    .stat-fill.force {
      background: linear-gradient(90deg, #dc2626, #fb7185);
    }

    .stat-fill.danger {
      background: linear-gradient(90deg, #f59e0b, #facc15);
    }

    .stat-fill.charisme {
      background: linear-gradient(90deg, #7c3aed, #c084fc);
    }

    /* BOOSTER */
    .booster-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4000;
      background:
        radial-gradient(circle, rgba(255,255,255,0.08), transparent 40%),
        rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      overflow: hidden;
      padding: 20px;
    }

    .booster-overlay.active {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    .booster-stage {
      position: relative;
      width: min(92vw, 420px);
      height: 620px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1400px;
    }

    .booster-pack {
      position: absolute;
      width: 320px;
      height: 500px;
      border-radius: 24px;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03)),
        linear-gradient(180deg, #1f2937, #0f172a 55%, #111 100%);
      border: 2px solid rgba(255,255,255,0.14);
      box-shadow: 0 25px 55px rgba(0,0,0,0.45);
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .booster-pack::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg,
          rgba(255,0,128,0.18),
          rgba(0,191,255,0.16),
          rgba(255,217,0,0.16),
          rgba(0,255,153,0.14));
      mix-blend-mode: screen;
      opacity: 0.7;
    }

    .booster-pack::after {
      content: "LOS SANTOS BOOSTER";
      position: absolute;
      left: 50%;
      top: 40px;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: center;
      width: 80%;
      text-shadow: 0 3px 15px rgba(0,0,0,0.35);
    }

    .pack-glow {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 70%);
      filter: blur(18px);
      animation: pulseGlow 1.8s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0%,100% { transform: scale(0.92); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .booster-pack.shake {
      animation: packShake 0.75s ease-in-out 2;
    }

    @keyframes packShake {
      0% { transform: rotate(-3deg) translateY(0); }
      20% { transform: rotate(3deg) translateY(-4px); }
      40% { transform: rotate(-2deg) translateY(0); }
      60% { transform: rotate(2deg) translateY(-6px); }
      80% { transform: rotate(-1deg) translateY(0); }
      100% { transform: rotate(0deg) translateY(0); }
    }

    .booster-pack.opening {
      animation: packOpen 1.3s forwards ease;
    }

    @keyframes packOpen {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      35% {
        transform: scale(1.06) rotate(4deg);
        opacity: 1;
      }
      70% {
        transform: scale(1.15) rotate(-4deg);
        opacity: 0.9;
      }
      100% {
        transform: scale(1.8) rotate(0deg);
        opacity: 0;
      }
    }

    .revealed-card {
      position: absolute;
      width: 320px;
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #151515, #0a0a0a);
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: 0 30px 60px rgba(0,0,0,0.55);
      transform: scale(0.6);
      opacity: 0;
    }

    .revealed-card.show {
      animation: revealCard 0.9s forwards ease;
    }

    @keyframes revealCard {
      0% {
        transform: scale(0.55) rotateY(90deg);
        opacity: 0;
      }
      60% {
        transform: scale(1.04) rotateY(0deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotateY(0deg);
        opacity: 1;
      }
    }

    .revealed-card img {
      width: 100%;
      height: 390px;
      object-fit: cover;
      display: block;
    }

    .revealed-card-content {
      padding: 16px;
    }

    .booster-actions {
      position: absolute;
      bottom: -70px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .small-btn {
      cursor: pointer;
      min-width: auto;
      padding: 12px 16px;
      font-weight: bold;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .modal-box {
        grid-template-columns: 1fr;
      }

      .modal-image-wrap {
        min-height: 330px;
        max-height: 430px;
      }

      .modal-title {
        font-size: 30px;
      }
    }

    @media (max-width: 520px) {
      h1 { font-size: 32px; }

      .card img { height: 280px; }

      .modal-info { padding: 20px; }

      .modal-title { font-size: 25px; }

      .booster-stage {
        height: 560px;
      }

      .booster-pack,
      .revealed-card {
        width: 280px;
      }

      .booster-pack {
        height: 450px;
      }

      .revealed-card img {
        height: 340px;
      }

      .booster-actions {
        bottom: -90px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Los Santos Cardedex</h1>
  </header>

  <div class="topbar">
    <input type="text" id="search" placeholder="Rechercher un personnage..." />
    <select id="filter">
      <option value="all">Toutes les raretés</option>
      <option value="rare">Rare</option>
      <option value="epique">Épique</option>
      <option value="legendaire">Légendaire</option>
    </select>
    <button class="booster-btn" id="openBoosterBtn">🎁 Ouvrir un booster</button>
  </div>

  <div class="grid" id="cardGrid"></div>

  <!-- MODAL CARTE -->
  <div class="modal" id="cardModal">
    <div class="modal-box" id="modalBox">
      <div class="modal-image-wrap">
        <img id="modalImage" src="" alt="">
      </div>
      <div class="modal-info">
        <button class="close-btn" id="closeModalBtn">×</button>
        <div class="modal-rarity" id="modalRarity"></div>
        <h2 class="modal-title" id="modalName"></h2>
        <div class="modal-subinfo">Carte personnage • Collection RP</div>

        <div class="modal-special">
          <strong>Capacité spéciale :</strong>
          <div id="modalSpecialText"></div>
        </div>

        <div class="modal-price" id="modalPrice"></div>

        <div class="modal-stats">
          <div class="stat-row">
            <div class="stat-head">
              <span class="stat-label">Intelligence</span>
              <span id="modalIntelligenceValue"></span>
            </div>
            <div class="stat-bar">
              <div class="stat-fill intelligence" id="modalIntelligenceBar"></div>
            </div>
          </div>

          <div class="stat-row">
            <div class="stat-head">
              <span class="stat-label">Force</span>
              <span id="modalForceValue"></span>
            </div>
            <div class="stat-bar">
              <div class="stat-fill force" id="modalForceBar"></div>
            </div>
          </div>

          <div class="stat-row">
            <div class="stat-head">
              <span class="stat-label">Danger</span>
              <span id="modalDangerValue"></span>
            </div>
            <div class="stat-bar">
              <div class="stat-fill danger" id="modalDangerBar"></div>
            </div>
          </div>

          <div class="stat-row">
            <div class="stat-head">
              <span class="stat-label">Charisme</span>
              <span id="modalCharismeValue"></span>
            </div>
            <div class="stat-bar">
              <div class="stat-fill charisme" id="modalCharismeBar"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOOSTER -->
  <div class="booster-overlay" id="boosterOverlay">
    <div class="booster-stage">
      <div class="pack-glow" id="packGlow"></div>
      <div class="booster-pack" id="boosterPack"></div>

      <div class="revealed-card hidden" id="revealedCard">
        <img id="revealedImage" src="" alt="">
        <div class="revealed-card-content">
          <div class="tag" id="revealedRarity"></div>
          <h3 id="revealedName" style="margin: 0 0 8px; font-size: 24px;"></h3>
          <div id="revealedSpecial" class="special"></div>
          <div id="revealedPrice" class="price"></div>
        </div>
      </div>

      <div class="booster-actions">
        <button class="small-btn hidden" id="showDetailsBtn">Voir la carte</button>
        <button class="small-btn" id="closeBoosterBtn">Fermer</button>
      </div>
    </div>
  </div>

    const modalBox = document.getElementById("modalBox");

    let boosterDrawnCard = null;

    function getCardClasses(card) {
      const holo = card.rarity === "epique" || card.rarity === "legendaire" ? "holo" : "";
      return `card ${card.rarity} ${holo}`.trim();
    }

    function setBar(barEl, value) {
      barEl.style.width = "0%";
      requestAnimationFrame(() => {
        setTimeout(() => {
          barEl.style.width = `${Math.max(0, Math.min(100, value))}%`;
        }, 80);
      });
    }

    function openModal(card) {
      modalImage.src = card.image;
      modalImage.alt = card.name;
      modalName.textContent = card.name;
      modalRarity.textContent = card.displayRarity;
      modalRarity.className = `modal-rarity ${card.rarity}`;
      modalSpecialText.textContent = card.special;
      modalPrice.textContent = `💰 Valeur : ${card.price}`;

      modalIntelligenceValue.textContent = card.intelligence;
      modalForceValue.textContent = card.force;
      modalDangerValue.textContent = card.danger;
      modalCharismeValue.textContent = card.charisme;

      modalBox.classList.toggle("holo", card.rarity === "epique" || card.rarity === "legendaire");

      modal.classList.add("active");
      document.body.style.overflow = "hidden";

      setBar(modalIntelligenceBar, card.intelligence);
      setBar(modalForceBar, card.force);
      setBar(modalDangerBar, card.danger);
      setBar(modalCharismeBar, card.charisme);
    }

    function closeModal() {
      modal.classList.remove("active");
      document.body.style.overflow = "";
    }

    function renderCards() {
      const searchValue = search.value.toLowerCase().trim();
      const filterValue = filter.value;

      const filteredCards = cards.filter(card => {
        const matchName = card.name.toLowerCase().includes(searchValue);
        const matchRarity = filterValue === "all" || card.rarity === filterValue;
        return matchName && matchRarity;
      });

      grid.innerHTML = "";

      if (!filteredCards.length) {
        grid.innerHTML = `<div class="empty-state">Aucune carte trouvée.</div>`;
        return;
      }

      filteredCards.forEach(card => {
        const div = document.createElement("div");
        div.className = getCardClasses(card);

        div.innerHTML = `
          <img src="${card.image}" alt="${card.name}">
          <div class="card-content">
            <div class="tag">${card.displayRarity}</div>
            <h3>${card.name}</h3>
            <div class="stats">
              INT: ${card.intelligence}<br>
              FOR: ${card.force}<br>
              DNG: ${card.danger}<br>
              CHA: ${card.charisme}
            </div>
            <div class="special">⭐ ${card.special}</div>
            <div class="price">💰 ${card.price}</div>
            <div class="click-hint">Cliquer pour voir</div>
          </div>
        `;

        div.addEventListener("click", () => openModal(card));
        grid.appendChild(div);
      });
    }

    function drawRandomCard() {
      const roll = Math.random() * 100;

      let rarityPool = "rare";
      if (roll < 8) rarityPool = "legendaire";
      else if (roll < 38) rarityPool = "epique";

      let pool = cards.filter(card => card.rarity === rarityPool);

      if (!pool.length) {
        pool = cards.filter(card => card.rarity === "epique");
      }
      if (!pool.length) {
        pool = cards.filter(card => card.rarity === "rare");
      }

      return pool[Math.floor(Math.random() * pool.length)];
    }

    function resetBooster() {
      boosterDrawnCard = null;
      boosterPack.classList.remove("opening", "shake", "hidden");
      revealedCard.classList.add("hidden");
      revealedCard.classList.remove("show", "holo");
      showDetailsBtn.classList.add("hidden");
    }

    function openBooster() {
      resetBooster();
      boosterOverlay.classList.add("active");
      document.body.style.overflow = "hidden";

      setTimeout(() => {
        boosterPack.classList.add("shake");
      }, 120);

      setTimeout(() => {
        boosterDrawnCard = drawRandomCard();
        boosterPack.classList.remove("shake");
        boosterPack.classList.add("opening");
      }, 1600);

      setTimeout(() => {
        boosterPack.classList.add("hidden");

        revealedImage.src = boosterDrawnCard.image;
        revealedImage.alt = boosterDrawnCard.name;
        revealedRarity.textContent = boosterDrawnCard.displayRarity;
        revealedRarity.className = `tag ${boosterDrawnCard.rarity}`;
        revealedName.textContent = boosterDrawnCard.name;
        revealedSpecial.textContent = `⭐ ${boosterDrawnCard.special}`;
        revealedPrice.textContent = `💰 ${boosterDrawnCard.price}`;

        revealedCard.classList.remove("hidden");
        revealedCard.classList.toggle("holo", boosterDrawnCard.rarity === "epique" || boosterDrawnCard.rarity === "legendaire");
        revealedCard.classList.add("show");

        showDetailsBtn.classList.remove("hidden");
      }, 2700);
    }

    function closeBooster() {
      boosterOverlay.classList.remove("active");
      document.body.style.overflow = "";
      setTimeout(resetBooster, 180);
    }

    search.addEventListener("input", renderCards);
    filter.addEventListener("change", renderCards);

    closeModalBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.classList.contains("active")) {
        closeModal();
      }
      if (e.key === "Escape" && boosterOverlay.classList.contains("active")) {
        closeBooster();
      }
    });

    openBoosterBtn.addEventListener("click", openBooster);
    closeBoosterBtn.addEventListener("click", closeBooster);

    boosterOverlay.addEventListener("click", (e) => {
      if (e.target === boosterOverlay) closeBooster();
    });

    showDetailsBtn.addEventListener("click", () => {
      if (!boosterDrawnCard) return;
      closeBooster();
      setTimeout(() => openModal(boosterDrawnCard), 220);
    });

    renderCards();
  </script>
</body>
</html>
