  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    header {
      padding: 30px 20px 10px;
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 40px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 20px 20px;
    }

    input, select {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #161616;
      color: white;
      min-width: 220px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: auto;
    }

    .card {
      background: #151515;
      border-radius: 16px;
      overflow: hidden;
      transition: 0.2s;
      box-shadow: 0 0 0 1px #222;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .card-content {
      padding: 14px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .rare {
      border: 2px solid #1d4ed8;
    }
    .rare .tag {
      background: #1d4ed8;
    }

    .epique {
      border: 2px solid #dc2626;
    }
    .epique .tag {
      background: #dc2626;
    }

    .legendaire {
      border: 2px solid #f59e0b;
    }
    .legendaire .tag {
      background: #f59e0b;
      color: black;
    }

    .stats {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: #ddd;
    }

    .special {
      margin-top: 10px;
      font-size: 14px;
      color: #fff;
      font-weight: bold;
    }

    .price {
      margin-top: 8px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

    const grid = document.getElementById("cardGrid");
    const search = document.getElementById("search");
    const filter = document.getElementById("filter");

    function renderCards() {
      const searchValue = search.value.toLowerCase();
      const filterValue = filter.value;

      const filteredCards = cards.filter(card => {
        const matchName = card.name.toLowerCase().includes(searchValue);
        const matchRarity = filterValue === "all" || card.rarity === filterValue;
        return matchName && matchRarity;
      });

      grid.innerHTML = "";

      filteredCards.forEach(card => {
        const div = document.createElement("div");
        div.className = `card ${card.rarity}`;
        div.innerHTML = `
          <img src="${card.image}" alt="${card.name}">
          <div class="card-content">
            <div class="tag">${card.displayRarity}</div>
            <h3>${card.name}</h3>
            <div class="stats">
              INT: ${card.intelligence}<br>
              FOR: ${card.force}<br>
              DNG: ${card.danger}<br>
              CHA: ${card.charisme}
            </div>
            <div class="special">⭐ ${card.special}</div>
            <div class="price">💰 ${card.price}</div>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    search.addEventListener("input", renderCards);
    filter.addEventListener("change", renderCards);

    renderCards();
  </script>
